version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vite-ecosystem:
        patterns: ["vite*", "@vitejs/*", "vitest*", "@vitest/*"]
      react-ecosystem:
        patterns: ["react*", "@types/react*", "eslint-plugin-react*"]
      tauri-ecosystem:
        patterns: ["@tauri-apps/*"]

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tauri-rust:
        patterns: ["tauri", "tauri-*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
