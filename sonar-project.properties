# SonarQube Cloud project configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/

# --- Project identity -------------------------------------------------------
# These MUST match the project you create in SonarQube Cloud (sonarcloud.io).
# When you import the GitHub repo, Sonar generates them as <ORG>_<REPO> and a
# lowercase organization slug. Adjust if yours differ.
sonar.projectKey=Crssz_llllllllammmmmmaaaaaaui
sonar.organization=crssz
sonar.projectName=llllllllammmmmmaaaaaaui

# --- What to analyze --------------------------------------------------------
# Frontend (React/TypeScript) + Tauri backend (Rust). Rust is analyzed
# statically by Sonar's built-in analyzer; no Rust build is required.
sonar.sources=src,src-tauri/src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/test/**
sonar.sourceEncoding=UTF-8

# Generated / vendored / build output — never analyze these.
sonar.exclusions=\
  src-tauri/target/**,\
  src-tauri/gen/**,\
  dist/**,\
  coverage/**,\
  node_modules/**

# --- Coverage ---------------------------------------------------------------
# TypeScript coverage comes from Vitest's LCOV reporter (npm run coverage).
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Keep Sonar's coverage % aligned with vitest.config.ts: only src/lib/**.ts and
# src/state/**.ts carry unit-tested logic. Everything else (UI .tsx, Rust,
# thin IPC/re-export shims, tests) is excluded from the coverage denominator so
# it does not report as artificially uncovered.
# NOTE: Rust coverage is not imported yet. To add it later, generate an LCOV
# report (e.g. `cargo llvm-cov --lib --lcov --output-path lcov.info`), rewrite
# its `SF:src/...` paths to `SF:src-tauri/src/...`, then set
# `sonar.rust.lcov.reportPaths` and drop `src-tauri/**` from the list below.
sonar.coverage.exclusions=\
  src-tauri/**,\
  src/**/*.tsx,\
  src/data.ts,\
  src/icons.tsx,\
  src/lib/api.ts,\
  src/state/effects.tsx,\
  src/state/index.ts,\
  src/state/persist.ts,\
  src/state/testUtils.ts,\
  src/test/**,\
  **/*.test.ts,\
  **/*.test.tsx
